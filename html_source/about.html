<!doctype html>
<html lang="en">
    <head>  
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Free Grilly</title>
        
        <link rel="stylesheet" type="text/css" href="custom-boostrap.min.css">

        <link rel="icon" href="data:,">
    </head>
  <body>
    <nav class="navbar navbar-expand bg-body-tertiary">
        <div class="container-fluid">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="/">Temperatures</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/probes">Probes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/settings">Settings</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/update">Update</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="my-2 row">
            <div class="col-5 col-lg-7">
                <h5 id="grill-name">Free Grilly</h5>
            </div>
        </div>

        <div class="row mt-2">
            <label class="col-5">Connected to Wifi</label>
            <div class="col-7" id="grill_wifi_connected">Loading</div>
        </div>
        <div class="row mt-2">
            <label class="col-5">Wifi ip</label>
            <div class="col-7" id="grill_wifi_ip">Loading</div>
        </div>
        <div class="row mt-2">
            <label class="col-5">UUID</label>
            <div class="col-7" id="grill_uuid">Loading</div>
        </div>
        <div class="row mt-2">
            <label class="col-5">Firmware version</label>
            <div class="col-7" id="grill_firmware_version">Loading</div>
        </div>

        <div class="row mt-3">
            <h5>Energy</h5>
        </div>
        <div class="row mt-2">
            <label class="col-5">Battery</label>
            <div class="col-7" id="grill_battery">Loading</div>
        </div>
        <div class="row mt-2">
            <label class="col-5">Cell voltage</label>
            <div class="col-7" id="grill_battery_voltage">Loading</div>
        </div>

        <div class="row mt-3">
            <h5>Diagnostics</h5>
        </div>
        <div class="row mt-2">
            <label class="col-5">Last restart</label>
            <div class="col-7" id="grill_last_reset">Loading</div>
        </div>
        <div class="row mt-2">
            <label class="col-5">Last power-off</label>
            <div class="col-7" id="grill_last_off">Loading</div>
        </div>

        <div class="row mt-2">
            <h5>Authors</h5>
        </div>

        <div class="row">
            <div class="col">
                Made with lots of love by <a href="https://github.com/epiecs">Epiecs</a> and <a href="https://questum.be/">Questum</a>
            </div>
        </div>
    </div>


    <script src="bootstrap.min.js" type="text/javascript"></script>
    <script type="text/javascript">

        const base_url = window.location.origin;
         
        e_grill_wifi_connected = document.getElementById("grill_wifi_connected");
        e_grill_wifi_ip        = document.getElementById("grill_wifi_ip");
        e_grill_uuid           = document.getElementById("grill_uuid");
        e_firmware_version     = document.getElementById("grill_firmware_version");
        e_battery              = document.getElementById("grill_battery");
        e_battery_voltage      = document.getElementById("grill_battery_voltage");
        e_last_reset           = document.getElementById("grill_last_reset");
        e_last_off             = document.getElementById("grill_last_off");

        // Friendly labels for the firmware diagnostics codes (firmware >= 26.07.01).
        const resetReasons = {
            poweron:   "Power-on",
            deepsleep: "Wake (button)",
            brownout:  "Voltage drop (brownout)",
            panic:     "Crash",
            int_wdt:   "Watchdog",
            task_wdt:  "Watchdog",
            wdt:       "Watchdog",
            sw:        "Software restart",
        };
        const offReasons = {
            button:      "Button",
            low_battery: "Battery protection (nearly empty)",
            boot_gate:   "Power-on not confirmed",
        };

        async function getSettings() {
            try {
                const response = await fetch(base_url + "/api/grill");
                data = await response.json();

                console.log(data);
                e_grill_wifi_connected.textContent = data['wifi_connected'];
                e_grill_wifi_ip.textContent        = data['wifi_ip'];
                e_grill_uuid.textContent           = data['unique_id'];
                e_firmware_version.textContent     = data['firmware_version'];

                // Energy
                const pct = data['battery_percentage'];
                const charging = data['battery_charging'] ? " · charging" : "";
                e_battery.textContent = (pct === undefined ? "—" : pct + "%") + charging;

                const mv = data['battery_millivolts'];
                e_battery_voltage.textContent = (mv && mv > 0) ? (mv / 1000).toFixed(2) + " V" : "—";

                // Diagnostics
                const rr = data['last_reset_reason'] || "";
                e_last_reset.textContent = resetReasons[rr] || rr || "—";

                const or = data['last_off_reason'] || "";
                e_last_off.textContent = offReasons[or] || or || "—";


            } catch (error) {
                console.error('Grill is unreachable:', error);
            }
        }

        getSettings();

    </script>
  </body>
</html>
