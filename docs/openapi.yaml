openapi: '3.1.1'
info:
  title: Free-Grilly
  version: '25.6.28'
  description: The local Free-Grilly api

externalDocs:
  url: https://github.com/epiecs/free-grilly
  description: Git repository

servers:
  - url: http://{free-grilly-ip}/api
    variables:
      free-grilly-ip:
        default: 192.168.200.10
        description: Your Free-Grilly ip address

tags:
  - name: grill
    description: Grill overview with current status and temperatures
  - name: probes
    description: Detailed probe data and settings
  - name: settings
    description: Settings management
  - name: alarm
    description: Alarm status and mute control
  - name: utility
    description: Utility api calls

components:
  responses:
    '400':
      description: Malformatted body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                default: "malformatted body"
                enum:
                  - malformatted body
                  - empty body
  schemas:
    Grill:
      type: object
      properties:
        name:
          type: string
          example: Free-Grilly
          description: The chosen grill name
        unique_id:
          type: string
          format: uuid
          example: 12abc3de-4567-89f0-a123-456b789012c3
          description: The unique id in UUIDv4 format
        firmware_version:
          type: string
          example: 25.03.01
          description: The current firmware version in CalVer
        battery_percentage:
          type: integer
          example: 95
          description: The current - estimated - battery %
        battery_charging:
          type: boolean
          example: true
          description: If the battery is charging
        battery_millivolts:
          type: integer
          example: 3980
          description: Measured cell voltage in mV (diagnostics; independent of the gauge SoC %)
        last_off_reason:
          type: string
          example: button
          description: >
            Why the device last powered off, persisted across the shutdown. One of
            "button" (2-10 s button press), "low_battery" (protective cutoff),
            "boot_gate" (woken but the button was not held long enough to confirm power-on),
            or empty if never recorded. Diagnostics for unexpected self-power-offs.
        last_reset_reason:
          type: string
          example: brownout
          description: >
            The ESP32 reset reason at the last boot (esp_reset_reason): e.g. "poweron",
            "deepsleep", "brownout", "panic", "int_wdt", "task_wdt", "sw", "unknown".
            An unexpected value (brownout/panic/wdt) after the device recovered on its own
            explains an apparent self-power-off.
        wifi_connected:
          type: boolean
          example: true
          description: If the grill is connected to a wifi network
        wifi_ssid:
          type: string
          example: my-home-wifi
          description: The name of the wifi network that the grill is connected to
        wifi_signal:
          type: integer
          example: -61
          description: The wifi signal expressed in dbm. The closer to 0 the better.
        wifi_ip:
          type: string
          example: 192.168.0.10
          description: The wifi ip when connected to your network
        temperature_unit:
          type: string
          description: The temperature_unit that is used
          example: celcius
          default: celcius
          enum:
            - celcius
            - fahrenheit
        alarm_active:
          type: boolean
          example: false
          description: >
            True when at least one probe has triggered its alarm
            (reached target temperature or left the allowed temperature range).
        mdns_hostname:
          type: string
          example: free-grilly-a1b2c3d4
          description: >
            The mDNS hostname (without .local suffix). The device is reachable
            at http://<mdns_hostname>.local on the local network.
        probes:
          type: array
          minItems: 8
          maxItems: 8
          items:
            type: object
            properties:
              probe_id:
                type: integer
                description: The number of the probe
              name:
                type: string
                example: Probe 1
                description: The probe name
              temperature:
                type:
                  - "number"
                  - "null"
                format: float
                description: The temperature in Celcius/Fahrenheit
              minimum_temperature:
                type:
                  - "number"
                  - "null"
                format: float
                description: The minimum temperature in Celcius/Fahrenheit according to the settings. Used for temperature ranges.
                examples:
                  - 30.00
                  - 25.5
              target_temperature:
                type:
                  - "number"
                  - "null"
                format: float
                description: The target temperature in Celcius/Fahrenheit
                examples:
                  - 30.00
                  - 25.5
              connected:
                type: boolean
                description: Is the probe connected
              alarm:
                type: boolean
                example: false
                description: >
                  True when this probe has triggered its alarm (temperature reached
                  target or left the allowed range). Mute via POST /alarm/mute.
              eta_seconds:
                type: integer
                example: 840
                description: >
                  Estimated seconds until the target temperature is reached
                  (linear regression over recent samples). -1 = unknown or
                  temperature is falling. 0 = target already reached.
            example:
              probe_id: 1
              name: Ambient Probe
              temperature: 23.71832
              minimum_temperature: null
              target_temperature: 90.0
              connected: true
              alarm: false
              eta_seconds: 840

    Probe:
      type: object
      properties:
        probe_id:
          type: integer
          description: The number of the probe
          examples:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
        name:
          type: string
          examples:
            - Probe 1
            - Ambient Probe
            - Pork shoulder
          description: The probe name
        temperature:
          type:
            - "number"
            - "null"
          format: float
          readOnly: true
          description: The temperature in Celcius/Fahrenheit according to the settings.
          examples:
            - 25.101
            - 27.101
            - 150.33
        minimum_temperature:
          type:
            - "number"
            - "null"
          format: float
          description: The minimum temperature in Celcius/Fahrenheit according to the settings. Used for temperature ranges.
          default: 0
          examples:
            - 25.50
            - 120
        target_temperature:
          type:
            - "number"
            - "null"
          format: float
          description: The target temperature in Celcius/Fahrenheit according to the settings.
          default: 0
          examples:
            - 25.50
            - 120
        connected:
          type: boolean
          description: Is the probe connected
          readOnly: true
        probe_type:
          type: string
          description: >
            The probe type connected to the grilleye. There are several built-in probe types. If
            you have the spec sheet of your probe you can try and setup a custom probe and provide
            the values. Not all probes will work so YMMV.
          example: grilleye_iris
          default: grilleye_iris
          enum:
            - custom
            - grilleye_iris
            - ikea_fantast
            - maverick_et733
            - weber_igrill
        reference_kohm:
          type:
            - "number"
            - "null"
          format: float
          example: 100
          default: 100
          description: The reference resistance value from the spec sheet in kOhm - only used with type CUSTOM
        reference_celcius:
          type:
            - "number"
            - "null"
          format: float
          example: 25
          default: 25
          description: The reference celcius value from the spec sheet - only used with type CUSTOM
        reference_beta:
          type:
            - "number"
            - "null"
          format: float
          examples:
            - 4250
            - null
          default: 4250
          description: The reference beta coefficient value from the spec sheet - only used with type CUSTOM


    Wifinetwork:
      type: object
      properties:
        ssid:
          type: string
          example: MyHomeWifi
          description: Wifi SSID
        signal_strength:
          type: integer
          example: -61
          description: The wifi signal expressed in dbm. The closer to 0 the better.
        auth_method:
          type: string
          description: The authentication method that is used by the wifi network
          example: wpa2_psk
          enum:
            - open
            - wep
            - wpa_psk
            - wpa2_psk
            - wpa_wpa2_psk
            - wpa2_enterprise
            - wpa3_psk
            - wpa2_wpa3_psk
            - wpapi_psk
            - unknown

    Settings:
      type: object
      properties:
        name:
          type: string
          example: Free-Grilly
          description: The chosen grill name
        unique_id:
          type: string
          format: uuid
          example: 12abc3de-4567-89f0-a123-456b789012c3
          description: The unique id in UUIDv4 format
          readOnly: true
        firmware_version:
          type: string
          example: 25.03.01
          description: The current firmware version in CalVer
          readOnly: true
        temperature_unit:
          type: string
          description: The temperature_unit that is used
          example: celcius
          default: celcius
          enum:
            - celcius
            - fahrenheit
        beep_enabled:
          type: boolean
          example: true
          description: Is the buzzer enabled
        beep_on_ready:
          type: boolean
          example: true
          description: Beep when the target_temperature is reached
        beep_outside_target:
          type: boolean
          example: true
          description: Beep when a probe is outside of a temperature range
        beep_volume:
          type: integer
          example: 5
          description: The beeper volume from 1-5
        beep_degrees_before:
          type: integer
          example: 5
          description: Beep when the probe reaches this amount of degrees before the target temperature
        screen_timeout_minutes:
          type: integer
          example: 0
          description: How many minutes before the screen turns off automatically. 0 disables the timeout.
        backlight_timeout_minutes:
          type: integer
          example: 0
          description: How many minutes before the backlight turns off automatically. 0 disables the timeout.
        backlight_brightness:
          type: integer
          description: Screen backlight brightness setting (0-5)
          example: 5
          default: 5
          minimum: 0
          maximum: 5
        power_saving:
          type: boolean
          description: >
            Battery power-saving mode. When true ("max battery"): WiFi modem-sleep
            (standard, stays reachable), the setup SoftAP is stopped once the home
            network is joined, and slower probe polling. TX power stays at full and the
            display is NOT forced off (display timeouts are user-controlled). When false
            ("always reachable", the default): radio stays fully awake and the SoftAP
            keeps running.
          example: false
          default: false
        opengrill_server:
          type: string
          example: "opengrill.test.com"
        mqtt_broker:
          type: string
          example: "broker.test.com"
        mqtt_port:
          type: integer
          example: 1883
        mqtt_topic:
          type: string
          example: "free-grilly"
        mqtt_user:
          type: string
          example: ""
        mqtt_password:
          type: string
          example: ""
        wifi_ssid:
          type: string
          example: my-home-wifi
          description: The name of the wifi network that the grill is connected to
        wifi_password:
          type: string
          example: "********"
          description: The wifi password.
        wifi_ip:
          type: string
          example: 192.168.0.10
          description: The wifi ip when connected to your network
        wifi_subnet:
          type: string
          example: 255.255.255.0
          description: The wifi subnet
        wifi_gateway:
          type: string
          example: 192.168.0.1
          description: The wifi gateway
        wifi_dns:
          type: string
          example: 9.9.9.9
          description: The wifi dns
        local_ap_ssid:
          type: string
          example: FreeGrilly
          description: The name of the grill's local wifi network
        local_ap_password:
          type: string
          example: "********"
          description: The local wifi password
        local_ap_ip:
          type: string
          example: 192.168.200.10
          description: The local wifi ip
        local_ap_subnet:
          type: string
          example: 255.255.255.0
          description: The local wifi subnet
        local_ap_gateway:
          type: string
          example: 192.168.200.1
          description: The local wifi gateway

paths:
  /grill:
    get:
      tags:
        - grill
      summary: Current grill info and probes
      description: >
        Get the current needed basic grill information + all the probes and
        their temperatures
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grill'

  /probes:
    get:
      tags:
        - probes
      summary: Probes
      description: >
        View current probe settings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                minItems: 8
                maxItems: 8
                items:
                  $ref: '#/components/schemas/Probe'
    post:
      tags:
        - probes
      summary: Probes
      description: >
        Edit probes, you are not required to send all probes. Just send a list of probes that you have modified.
      requestBody:
        required: true
        description: Settings to set
        content:
            application/json:
              schema:
                type: array
                minItems: 1
                maxItems: 8
                items:
                  $ref: '#/components/schemas/Probe'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                minItems: 8
                maxItems: 8
                items:
                  $ref: '#/components/schemas/Probe'
        '400':
          $ref: '#/components/responses/400'

  /settings:
    get:
      tags:
        - settings
      summary: Grill settings
      description: >
        Endpoint to view current settings
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
    post:
      tags:
        - settings
      summary: Grill settings
      description: >
        Endpoint to edit settings
      requestBody:
        required: true
        description: Settings to set
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Settings'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Settings'
        '400':
          $ref: '#/components/responses/400'

  /probes/history:
    get:
      tags:
        - probes
      summary: Temperature history per probe (two-tier)
      description: >
        Returns two time-uniform history tiers per probe so clients can show both recent
        detail and the whole cook (e.g. multi-hour Pulled Pork) without unbounded memory:

          * `history` — fine tier: last ≤180 readings sampled every `interval_seconds`
            (10 s) → up to 30 minutes of recent detail.
          * `history_coarse` — coarse tier: last ≤180 readings sampled every
            `coarse_interval_seconds`. This interval is **adaptive**: it starts at 60 s and
            doubles whenever the buffer fills (so memory stays fixed while the covered
            window grows: 3 h → 6 h → 12 h → 24 h → 48 h …). Covers the whole cook.

        Both tiers are time-uniform within themselves. The device has no wall clock — the
        newest sample of each tier corresponds to ~now; walk backwards in steps of the
        respective interval to place older samples in time. Values are celsius × 10 (int16,
        divide by 10.0 for °C). Disconnected probes freeze (no new samples appended).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  interval_seconds:
                    type: integer
                    example: 10
                    description: Seconds between samples in the fine `history` array.
                  coarse_interval_seconds:
                    type: integer
                    example: 60
                    description: >
                      Seconds between samples in the `history_coarse` array. Adaptive —
                      starts at 60 and doubles as the coarse buffer fills. Shared by all
                      probes (they are sampled in lockstep).
                  probes:
                    type: array
                    minItems: 8
                    maxItems: 8
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Brisket
                        history:
                          type: array
                          description: Fine tier — celsius × 10 (divide by 10.0 for °C)
                          items:
                            type: integer
                          example: [850, 855, 862, 870, 878, 887]
                        history_coarse:
                          type: array
                          description: Coarse tier (whole cook) — celsius × 10 (divide by 10.0 for °C)
                          items:
                            type: integer
                          example: [210, 405, 612, 770, 812, 845]

  /alarm/mute:
    post:
      tags:
        - alarm
      summary: Mute active alarm
      description: >
        Silences the buzzer and clears the alarm banner until the next alarm event.
        Has no effect if no alarm is currently active.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
    options:
      tags:
        - alarm
      summary: CORS pre-flight for alarm/mute
      responses:
        '200':
          description: OK

  /info:
    get:
      tags:
        - utility
      summary: Device identity and capabilities
      description: >
        Lightweight endpoint for app discovery confirmation and feature detection.
        Check the `capabilities` array before using features added in newer firmware.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  uuid:
                    type: string
                    format: uuid
                    example: a1b2c3d4-e5f6-7890-ab12-cd3456ef7890
                  name:
                    type: string
                    example: My BBQ
                  firmware:
                    type: string
                    example: 25.06.28
                  mdns_hostname:
                    type: string
                    example: free-grilly-a1b2c3d4
                    description: Hostname without .local suffix
                  capabilities:
                    type: array
                    items:
                      type: string
                    example: ["history", "alarm_mute", "eta", "power_saving"]

  /wifiscan:
    get:
      tags:
        - utility
      summary: Scan for wifi networks
      description: >
        Scans for nearby wifi networks, has a long latency of about 5-7 seconds
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                minItems: 0
                items:
                  $ref: '#/components/schemas/Wifinetwork'
